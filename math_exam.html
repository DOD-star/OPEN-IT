<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Prep 3 | Final 50 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --blue: #58a6ff; --red: #da3633; --text: #e6edf3; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }

        /* تنسيق الكسر الرأسي */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            align-items: center;
            margin: 0 5px;
            font-size: 0.9em;
        }
        .num { border-bottom: 2px solid var(--text); padding: 0 4px; width: 100%; text-align: center; }
        .den { padding: 0 4px; width: 100%; text-align: center; }

        .q-card { background: var(--card); border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid #30363d; transition: 0.3s; }
        .q-num { background: var(--blue); color: #000; padding: 4px 10px; border-radius: 5px; font-weight: 900; margin-bottom: 10px; display: inline-block; }
        
        .correct { border: 3px solid var(--accent) !important; background: #1b2e1b !important; }
        .wrong { border: 3px solid var(--red) !important; background: #2d1616 !important; }
        .feedback { display: none; margin-top: 15px; font-weight: bold; font-family: 'Cairo'; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        .options label { background: #21262d; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .options input { margin-right: 10px; transform: scale(1.2); }

        .submit-btn { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 10px; font-size: 1.5rem; font-weight: 900; cursor: pointer; width: 100%; margin: 30px 0; }
        #floating-res { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #000; padding: 15px; border-radius: 12px; display: none; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:40px;">
        <h1 style="color:var(--blue); font-size:2.5rem; margin:0;">MATH PREP 3 EXAM</h1>
        <p style="font-family:'Cairo'; color:#8b949e;">الـ 50 سؤال كاملين - بنظام التصحيح الفوري</p>
    </header>

    <div id="exam-box"></div>

    <button class="submit-btn" onclick="checkAll()">CHECK MY ANSWERS 🏁</button>
</div>

<div id="floating-res">
    <div id="score-text">Score: 0/50</div>
    <div id="percent-text">0%</div>
</div>

<script>
    const f = (n, d) => `<span class="fraction"><span class="num">${n}</span><span class="den">${d}</span></span>`;

    const questions = [
        // Algebra 1-25
        { q: `The domain of f(x) = ${f('x - 3', 'x - 5')} is R - { ... }`, o: ["3", "5", "-5", "0"], a: 1 },
        { q: `If P(A) = 0.8, then P(A') = ...`, o: ["0.2", "0.8", "1.8", "0"], a: 0 },
        { q: `The zeros of f(x) = x² - 9 are ...`, o: ["{3}", "{-3}", "{3, -3}", "Φ"], a: 2 },
        { q: "The lines x=3 and y=4 intersect in the point ...", o: ["(4,3)", "(3,4)", "(0,0)", "(3,0)"], a: 1 },
        { q: "If x + y = 6 and x - y = 2, then x = ...", o: ["2", "4", "6", "8"], a: 1 },
        { q: `Simplest form of ${f('x² - 1', 'x - 1')} is ...`, o: ["x", "x-1", "x+1", "1"], a: 2 },
        { q: "The degree of x² + 5x + 6 = 0 is ...", o: ["1st", "2nd", "3rd", "Zero"], a: 1 },
        { q: `Domain of f(x) = ${f('5', 'x')} is R - { ... }`, o: ["5", "0", "R", "Φ"], a: 1 },
        { q: "If P(A∩B) = 0, then A, B are ...", o: ["Mutually Exclusive", "Equal", "Certain", "Impossible"], a: 0 },
        { q: "Solution set of x² + 16 = 0 in R is ...", o: ["{4}", "{-4}", "{4, -4}", "Φ"], a: 3 },
        { q: "Point (-2, 5) lies in the ... quadrant.", o: ["1st", "2nd", "3rd", "4th"], a: 1 },
        { q: `If f(x) = ${f('x - 2', 'x')}, then f(2) = ...`, o: ["2", "0", "-2", "undefined"], a: 1 },
        { q: "Number of real roots for x² + 1 = 0 is ...", o: ["0", "1", "2", "3"], a: 0 },
        { q: "If (x, 3) = (5, y), then x+y = ...", o: ["2", "8", "15", "5"], a: 1 },
        { q: "Probability of a certain event is ...", o: ["0", "0.5", "1", "100"], a: 2 },
        { q: `Inverse of ${f('x', 'x - 1')} is ...`, o: [f('-x', 'x - 1'), f('x', 'x + 1'), f('x-1', 'x'), "1"], a: 0 },
        { q: "Zeros of f(x) = x² + 5x are ...", o: ["{0}", "{-5}", "{0, -5}", "{5}"], a: 2 },
        { q: "If A ⊂ B, then P(A ∩ B) = ...", o: ["P(A)", "P(B)", "0", "1"], a: 0 },
        { q: `Domain of f(x) = ${f('x + 1', 'x² - 4')} is R - { ... }`, o: ["{2}", "{-2}", "{2, -2}", "Φ"], a: 2 },
        { q: `If P(A) = ${f('1', '4')}, then P(A') = ...`, o: [f('1', '4'), f('3', '4'), "1", "0"], a: 1 },
        { q: "The y-intercept of 3x + y = 6 is ...", o: ["2", "6", "0", "3"], a: 1 },
        { q: "If x² = 100, then x = ...", o: ["10", "-10", "±10", "Φ"], a: 2 },
        { q: "If P(success) = 0.7, then P(failure) = ...", o: ["0.7", "0.3", "1", "0"], a: 1 },
        { q: "The function f(x) = 5 is of ... degree.", o: ["1st", "2nd", "3rd", "Zero"], a: 3 },
        { q: "Simplest form of (x-2)/(x-2) is ... (x≠2)", o: ["0", "1", "x", "2"], a: 1 },

        // Geometry 26-50
        { q: "Inscribed angle is ... of the central angle.", o: ["half", "double", "equal", "quarter"], a: 0 },
        { q: "Opposite angles in a cyclic quad are ...", o: ["Equal", "Complementary", "Supplementary", "Right"], a: 2 },
        { q: "Measure of a semicircle arc is ...", o: ["90°", "180°", "360°", "45°"], a: 1 },
        { q: "Number of circles through 3 non-collinear points is ...", o: ["1", "2", "3", "Infinite"], a: 0 },
        { q: "Inscribed angle in a semicircle is ...", o: ["Acute", "Obtuse", "Right", "Straight"], a: 2 },
        { q: "Number of tangents from a point outside the circle is ...", o: ["1", "2", "3", "Infinite"], a: 1 },
        { q: "Central angle is ... its arc measure.", o: ["Half", "Equal", "Double", "Triple"], a: 1 },
        { q: "Cyclic quad ABCD, m(A)=70, then m(C)= ...", o: ["70", "110", "180", "20"], a: 1 },
        { q: "Tangents at ends of diameter are ...", o: ["Parallel", "Perpendicular", "Intersecting", "Equal"], a: 0 },
        { q: "Radius = 5, diameter = ...", o: ["5", "10", "2.5", "25"], a: 1 },
        { q: "Common tangents to two distant circles is ...", o: ["2", "3", "4", "1"], a: 2 },
        { q: "Number of axes of symmetry for a circle is ...", o: ["1", "2", "3", "Infinite"], a: 3 },
        { q: "Angle of tangency is between tangent and ...", o: ["Radius", "Diameter", "Chord", "Arc"], a: 2 },
        { q: "Circles touch externally if MN = ...", o: ["r1-r2", "r1+r2", "zero", "r1"], a: 1 },
        { q: "Inscribed angle is 60, then its arc = ...", o: ["30", "60", "120", "240"], a: 2 },
        { q: "Exterior angle of cyclic quad = ... opposite angle.", o: ["Adjacent", "Interior", "Central", "90"], a: 1 },
        { q: "Area of circle with r=7 is ... π", o: ["7", "14", "49", "21"], a: 2 },
        { q: "How many circles through 3 collinear points?", o: ["0", "1", "3", "Infinite"], a: 0 },
        { q: "Tangent is ... to radius at point of tangency.", o: ["Parallel", "Perpendicular", "Equal", "None"], a: 1 },
        { q: "Equal chords are ... from the center.", o: ["Equidistant", "Parallel", "Perpendicular", "None"], a: 0 },
        { q: "Arc representing 1/4 of a circle is ...°", o: ["90", "180", "360", "45"], a: 0 },
        { q: "Chord length 6, r=5, distance from center = ...", o: ["3", "4", "2", "5"], a: 1 },
        { q: "Sum of angles of a triangle = ...°", o: ["90", "180", "360", "270"], a: 1 },
        { q: "Longest chord is the ...", o: ["Radius", "Tangent", "Diameter", "Arc"], a: 2 },
        { q: "Number of tangents from point ON the circle is ...", o: ["0", "1", "2", "Infinite"], a: 1 }
    ];

    const box = document.getElementById('exam-box');
    questions.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `card-${idx}`;
        card.innerHTML = `
            <span class="q-num">Q${idx + 1}</span>
            <div style="font-weight:700; font-size:1.2rem;">${item.q}</div>
            <div class="options">
                ${item.o.map((opt, i) => `<label><input type="radio" name="q-${idx}" value="${i}"> ${opt}</label>`).join('')}
            </div>
            <div class="feedback" id="feed-${idx}"></div>
        `;
        box.appendChild(card);
    });

    function checkAll() {
        let score = 0;
        questions.forEach((item, idx) => {
            const card = document.getElementById(`card-${idx}`);
            const feed = document.getElementById(`feed-${idx}`);
            const sel = document.querySelector(`input[name="q-${idx}"]:checked`);
            feed.style.display = "block";
            if(sel && parseInt(sel.value) === item.a) {
                score++;
                card.classList.add('correct');
                feed.innerHTML = "✔️ Correct!";
                feed.style.color = "#39d353";
            } else {
                card.classList.add('wrong');
                feed.innerHTML = `❌ Wrong! Correct: ${item.o[item.a]}`;
                feed.style.color = "#ff7b72";
            }
        });
        const res = document.getElementById('floating-res');
        res.style.display = "block";
        document.getElementById('score-text').innerText = `Score: ${score}/50`;
        document.getElementById('percent-text').innerText = `${(score/50)*100}% Success`;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
