<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JODY STORY</title>
    <style>
        /* إعدادات الخلفية العامة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* حاوية المحتوى الرئيسي */
        .welcome-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff6b81;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
        }

        /* تصميم الزر الواقعي ثلاثي الأبعاد */
        .start-btn {
            position: relative;
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 6px #cf2333, 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
        }

        /* عند تمرير الماوس فوق الزر */
        .start-btn:hover {
            background: #ff5766;
        }

        /* تأثير الضغط الواقعي للزر */
        .start-btn:active {
            box-shadow: 0 2px #cf2333, 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: translateY(4px);
        }

        /* أنيميشن الطائرة والعالم */
        .travel-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            display: none;
        }

        /* صورة الكرة الأرضية في المنتصف */
        .world-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0); 
            width: 350px;
            height: 350px;
            object-fit: contain;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.2));
        }

        /* حاوية الطائرة للتحكم في المدار الدائري */
        .plane-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            display: none;
            animation: spin 3.5s linear infinite; 
        }

        /* صورة الطائرة - تم تكبير الحجم وزيادة الإزاحة لتناسب الحجم الجديد */
        .plane-img {
            position: absolute;
            width: 130px; /* تم تكبير الحجم من 80px إلى 130px */
            height: auto;
            /* translateX(200px) تبعد الطائرة عن المركز لتدور بشكل متناسق مع حجمها الجديد */
            transform: translate(200px, -50%) rotate(45deg); 
        }

        /* أنيميشن دوران المدار */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* تأثير القلوب المتساقطة */
        .heart {
            position: absolute;
            color: #ff6b81;
            font-size: 20px;
            pointer-events: none;
            animation: fall 4s linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="welcome-container" id="welcomeBox">
        <h1></h1> Jody story. ✨</h1>
        <p>جاهزه ل رحلتك؟! ✈️🌍</p>
        <button class="start-btn" onclick="startJourney()">ابدئي الرحلة 🌍</button>
    </div>

    <div class="travel-animation" id="animationScreen">
        <img src="world.png" alt="World" class="world-img" id="worldGlobe">
        
        <div class="plane-container" id="airplaneContainer">
            <img src="plane.png" alt="Plane" class="plane-img">
        </div>
    </div>

    <script>
        // أنيميشن تساقط القلوب في الخلفية
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.getElementById('hearts-container').appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 400);

        // تشغيل الرحلة والأنيميشن عند الضغط
        function startJourney() {
            const welcomeBox = document.getElementById('welcomeBox');
            const animationScreen = document.getElementById('animationScreen');
            const worldGlobe = document.getElementById('worldGlobe');
            const airplaneContainer = document.getElementById('airplaneContainer');

            // إخفاء صندوق الترحيب بسلاسة
            welcomeBox.style.opacity = '0';
            welcomeBox.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                welcomeBox.style.display = 'none';
                animationScreen.style.display = 'block';
                
                // تضخيم صورة العالم وتشغيل الطائرة
                setTimeout(() => {
                    worldGlobe.style.transform = 'translate(-50%, -50%) scale(1)';
                    airplaneContainer.style.display = 'block';
                }, 100);

                // الانتقال التلقائي لصفحة التايملاين بعد انتهاء حركة الطيران (4 ثوانٍ)
                setTimeout(() => {
                    window.location.href = 'timeline.html'; 
                }, 4000);

            }, 500);
        }
    </script>
</body>
</html>
